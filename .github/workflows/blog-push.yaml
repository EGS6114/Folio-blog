# 构建项目并将产物推送到 build 分支，然后部署到 Cloudflare Workers
name: Build to Branch

# 当推送到 main 分支时触发，也支持手动触发
on:
  push:
    branches: [main]
  workflow_dispatch:

# 需要写入权限来推送 build 分支
permissions:
  contents: write

# 同一时间只运行一个构建任务，取消正在运行的旧任务
concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 Node.js 并配置 npm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 安装项目依赖
      - name: Install Dependencies
        run: npm clean-install --progress=false

      # 构建项目：生成图标 → Astro 构建 → Pagefind 索引
      - name: Build
        run: npm run build

      # 推送 dist 目录到 build 分支
      - name: Push to build branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: build